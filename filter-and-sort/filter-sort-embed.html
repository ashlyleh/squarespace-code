<!------------------------------------------------------------------------
  filter-sort v2.0 — PAGE EMBED SNIPPETS
  Place in: Pages → [Page] → ⚙️ → Advanced → Page Header Code Injection

  INSTRUCTIONS
  1. Copy the relevant snippet (blog OR events) for each page.
  2. Adjust window.filterSortConfig values as needed.
  3. The <script src> loads the script from jsDelivr CDN.
     After pushing to GitHub, bust cache by changing @main to a commit hash.
-------------------------------------------------------------------------


━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  BLOG PAGE EMBED
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Add a single Code Block to your blog page with this HTML:
  <div id="blog-filter-app"></div>

Then paste the config + script in the page's header code injection.
-->

<script>
window.filterSortConfig = {
  /* ── Required ───────────────────────────────────── */
  blogMountId:  'blog-filter-app',   /* matches your Code Block ID    */
  blogUrl:      '/blog',             /* your blog page URL            */

  /* ── Layout ─────────────────────────────────────── */
  /* Options: 'basic-grid' | 'masonry' | 'single-column' | 'side-by-side' | 'alternating' */
  blogLayout:   'basic-grid',
  blogNewsroom: false,               /* true = large hero first card  */

  /* ── Filters (set false to hide) ────────────────── */
  blogShowSearch:   true,
  blogShowCategory: true,
  blogShowTag:      true,
  blogShowAuthor:   true,
  blogShowYear:     true,
  blogShowSort:     true,

  /* ── Labels ──────────────────────────────────────── */
  blogLabelCategory: 'Categories',
  blogLabelTag:      'Tags',
  blogLabelAuthor:   'Authors',
  blogLabelYear:     'Date',
  blogResetLabel:    'Reset',
  blogReadMore:      'Read more',
  blogLoadMore:      'Load more',
  blogNoResults:     'No posts match your filters.',

  /* ── Archive ─────────────────────────────────────── */
  archiveAllLabel:  '‹ See All',
  archivePosition:  'bottom',        /* 'top' or 'bottom'             */
};
</script>

<script src="https://cdn.jsdelivr.net/gh/ashlyleh/squarespace-code@main/filter-and-sort/filter-sort.js"></script>
