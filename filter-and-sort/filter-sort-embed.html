<!------------------------------------------------------------------------
  filter-sort — PAGE EMBED SNIPPETS
  Place in: Squarespace → Pages → [Page] → Page Header Code Injection
  Or in: Settings → Advanced → Code Injection → Footer (site-wide)

  INSTRUCTIONS:
  1. Copy the relevant snippet (blog OR events) for each page.
  2. Adjust window.filterSortConfig values as needed per page.
  3. The <script src="..."> line loads the unified JS from jsDelivr.
     Update the @version tag after each GitHub push, e.g. @v1.1, @main.
-------------------------------------------------------------------------


━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  BLOG PAGE EMBED
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Place this in the blog page's header code injection.
The filter buttons div and sort dropdown div must exist in your
page layout as Code Blocks with matching IDs.
-->

<script>
window.filterSortConfig = {
  /* ── Blog ───────────────────────────────────── */
  blogGridSelector:  '.blog-basic-grid',   /* or '.blog-alternating-side-by-side' */
  blogItemSelector:  '.blog-item',
  filterContainerId: 'filter-buttons-1',
  sortDropdownId:    'sort-dropdown-1',
  allPostsLabel:     'All Posts',

  /* ── Archive ────────────────────────────────── */
  archiveAllLabel:   '‹ See All',
  archivePosition:   'bottom',             /* 'top' or 'bottom' */
};
</script>

<!------------ 📋 Blog Filter & Sort ------------>
<script src="https://cdn.jsdelivr.net/gh/ashlyleh/squarespace-code@main/filter-sort.js"></script>


<!--
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  EVENTS PAGE EMBED
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
1. Add a Code Block to your events page ABOVE the Squarespace
   events block. Give it the ID matching eventsContainerId below.
   Example Code Block HTML:
     <div id="evt-filter-app"></div>

2. Paste this snippet in the events page header code injection.
-->

<script>
window.filterSortConfig = {
  /* ── Events ─────────────────────────────────── */
  eventsContainerId: 'evt-filter-app',
  upcomingLabel:     'Upcoming',
  pastLabel:         'Past',
  eventCountLabel:   'events',
  resetLabel:        'Reset',
  noResultsTitle:    'No events match these filters.',
  noResultsSub:      'Try adjusting your filters.',
  viewEventLabel:    'View Event',

  /* Toggle filters on/off per page */
  showLocation:      true,
  showDate:          true,
  showCategory:      true,
  showTag:           true,
  showEventCount:    true,
  showReset:         true,

  /* Date/time format */
  use24Hour:         false,
};
</script>

<!------------ 📅 Events Filter ------------>
<script src="https://cdn.jsdelivr.net/gh/ashlyleh/squarespace-code@main/filter-sort.js"></script>
